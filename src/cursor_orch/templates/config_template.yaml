# DEPRECATED: This template is kept for backward compatibility with `cursor-orch run --config`.
# The preferred interface is the interactive REPL: run `cursor-orch` with no arguments.
#
# cursor-orch configuration
# See README.md for full reference

# Name for this orchestration run
name: "my-orchestration"

# Default model for all agents (can be overridden per task)
model: "default"

# prompt: "Describe your orchestration objective here"

# Bootstrap repo name (created in your GitHub account)
bootstrap_repo_name: "cursor-orch-bootstrap"

# Repositories involved in this orchestration
repositories:
  my-repo:
    url: "https://github.com/your-org/your-repo"
    ref: "main"

# Tasks to execute
tasks:
  - id: "example-task"
    repo: "my-repo"
    prompt: |
      Describe what this task should accomplish.
      Be specific about the changes needed.
    depends_on: []
    # model: "override-model"  # optional per-task model
    # timeout_minutes: 30      # optional timeout

# Target branch and PR settings
target:
  auto_create_pr: true
  branch_prefix: "cursor-orch"
